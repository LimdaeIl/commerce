server:
  port: 10000
  shutdown: graceful
  compression:
    enabled: true
    min-response-size: 2KB
    mime-types: text/html,text/xml,text/plain,text/css,application/javascript,application/json,application/xml
  http2:
    enabled: true
  tomcat:
    threads:
      max: 200         # 트래픽/CPU에 맞게 조정
      min-spare: 10
    max-swallow-size: 2MB
    max-http-form-post-size: 2MB
    connection-timeout: 5s
  forward-headers-strategy: framework

spring:
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

  application:
    name: Prod-friday-commerce-service

  output:
    ansi:
      enabled: never

  datasource:
    url: jdbc:mysql://${RDS_ENDPOINT}:3306/commerce?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}

    hikari:
      pool-name: HikariPool-Prod
      maximum-pool-size: 20
      minimum-idle: 5
      leak-detection-threshold: 0
      connection-timeout: 5000     # 5s  → 5,000 ms
      max-lifetime: 1800000        # 30m → 1,800,000 ms
      idle-timeout: 300000         # 5m  →   300,000 ms

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
        show_sql: false
        jdbc.time_zone: Asia/Seoul
        generate_statistics: false
        session.events.log.LOG_QUERIES_SLOWER_THAN_MS: 0
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      client-type: lettuce
      client-name: ${spring.application.name}
      connect-timeout: 2s
      timeout: 2s
      ssl:
        enabled: ${REDIS_SSL:false}

      lettuce:
        pool:
          enabled: true
          max-active: 32
          max-idle: 16
          min-idle: 2
          max-wait: 2s

  jwt:
    secret-access: ${ACCESS_SECRET}
    secret-refresh: ${REFRESH_SECRET}
    access-token-expiration: ${ACCESS_TOKEN_EXPIRATION:36000000}
    refresh-token-expiration: ${REFRESH_TOKEN_EXPIRATION:86400000}

  mail:
    host: smtp.naver.com
    port: ${NAVER_MAIL_PORT}
    username: ${NAVER_ID}
    password: ${NAVER_PW}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true
          connectionTimeout: ${TIMEOUT}
          timeout: ${TIMEOUT}
          writeTimeout: ${TIMEOUT}
        debug: false

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  health:
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    org.hibernate: WARN
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
    org.hibernate.orm.jdbc.extract: OFF
    org.hibernate.stat: OFF
    org.springframework.jdbc.core: WARN
    org.springframework.transaction: WARN
    org.springframework.orm.jpa: WARN
    com.zaxxer.hikari: INFO
    com.zaxxer.hikari.HikariConfig: INFO
    org.springframework.data.redis: WARN
    io.lettuce.core: WARN

snowflake:
  epoch-millis: ${SNOWFLAKE_EPOCH_MILLIS}             # 2025-09-22T00:00:00Z
  node-id: ${SNOWFLAKE_NODE_ID}                       # 각 인스턴스/노드별 고유 값 할당
  clock-skew-tolerance-millis: ${SNOWFLAKE_CLOCK_SKEW_TOLERANCE_MILLIS}  # 5~20 권장
  auto-detect-node-id: ${SNOWFLAKE_AUTO_DETECT_NODE_ID}       # 운영에선 명시 지정 권장


auth:
  email:
    code-validity-duration: 5m
    resend-cooldown-duration: 60s
    max-attempts: 5
    lockout-duration: 10m
    success-validity-duration: 10m


security:
  current-user:
    allow-header-fallback: false


  jwt:
    filter:
      default-path-pattern: REQUIRED
      exclude-path-patterns:
        - /actuator/**
        - /docs/**
        - /checkout.html
        - /favicon.ico
        - /api/v1/payments/**
        - /api/v1/auth/**
        - /api/v1/orders/*/brief
        - /v3/api-docs/**
        - /swagger-ui/**
        - /swagger-ui.html
      optional-path-patterns:
        - /users/**
      include-path-patterns:
        - /api/**

commerce:
  catalog:
    category:
      max-depth: 5
      hard-limit: 7

toss:
  base-url: https://api.tosspayments.com
  clientKey: ${TOSS_CLIENT_KEY}
  secretKey: ${TOSS_SECRET_KEY}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui
    display-request-duration: true
    try-it-out-enabled: false
    operations-sorter: method
    tags-sorter: alpha