name: friday-commerce

networks:
  friday-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:

services:
  mysql:
    image: mysql:8.0.43
    container_name: friday-mysql
    restart: unless-stopped
    ports:
      - "3333:3306"              # ← application.yml 의 localhost:3333 과 일치
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-commerce}
      MYSQL_USER: ${MYSQL_USER:-local}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-local}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Seoul
    command: [
      "--disable-log-bin",                # dev: binlog 끔(디스크 절약)
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_0900_ai_ci",
      "--default-time-zone=+09:00",       # tz 테이블 없이도 고정
      "--skip-name-resolve",              # 역DNS 비활성화 → 접속 지연 방지
      "--max-connections=150",
      "--innodb-buffer-pool-size=256M",
      "--innodb-log-file-size=128M"
    ]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER:-local} -p${MYSQL_PASSWORD:-local} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    volumes:
      - mysql-data:/var/lib/mysql
      # 현재 파일 위치 = 프로젝트루트/docker/mysql/conf.d/my.cnf
      - ./docker/mysql/conf.d/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      # 초기 스크립트가 있으면 아래 주석 해제
      # - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - friday-net

  redis:
    image: redis:7.2-alpine
    container_name: friday-redis
    restart: unless-stopped
    ports:
      - "6379:6379"        # spring.data.redis.host=localhost, port=6379 매칭
    environment:
      TZ: Asia/Seoul
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}            # ""면 인증 미사용
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-512mb}     # 로컬 기본 512MB
      REDIS_MAXMEMORY_POLICY: ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    command: >
      sh -c 'exec redis-server
             --appendonly yes
             --appendfsync everysec
             --save 900 1 --save 300 10 --save 60 10000
             --maxmemory ${REDIS_MAXMEMORY:-512mb}
             --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
             ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 -p 6379 ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - redis-data:/data
      # 아직 redis.conf 파일을 만들지 않았으니 일단 주석 유지
      # 만들었다면 위치는 ./docker/redis/redis.conf 로 맞추세요
      # - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - friday-net
