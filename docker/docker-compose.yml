name: friday-commerce

networks:
  friday-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  prometheus-data:
  prometheus-conf:   # init 컨테이너가 prometheus.yml 생성
  grafana-data:

services:
  mysql:
    image: mysql:8.0.43
    container_name: friday-mysql
    restart: unless-stopped
    ports:
      - "3333:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-commerce}
      MYSQL_USER: ${MYSQL_USER:-local}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-local}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Seoul
    command: [
      "--disable-log-bin",
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_0900_ai_ci",
      "--default-time-zone=+09:00",
      "--skip-name-resolve",
      "--max-connections=150",
      "--innodb-buffer-pool-size=256M",
      "--innodb-log-file-size=128M"
    ]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER:-local} -p${MYSQL_PASSWORD:-local} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - friday-net

  redis:
    image: redis:7.2-alpine
    container_name: friday-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Seoul
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-512mb}
      REDIS_MAXMEMORY_POLICY: ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    command: >
      sh -c 'exec redis-server
             --appendonly yes
             --appendfsync everysec
             --save 900 1 --save 300 10 --save 60 10000
             --maxmemory ${REDIS_MAXMEMORY:-512mb}
             --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
             ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 -p 6379 ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - redis-data:/data
    networks:
      - friday-net

  # --- Exporters ---
  mysqld-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: friday-mysqld-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: root:${MYSQL_ROOT_PASSWORD:-root}@(friday-mysql:3306)/
    depends_on:
      - mysql
    networks:
      - friday-net

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: friday-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://friday-redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      - redis
    networks:
      - friday-net

  # --- Prometheus 설정을 볼륨에 생성(윈도우 안전판: env + printf) ---
  prometheus-config:
    image: busybox:1.36
    container_name: friday-prometheus-config
    restart: "no"
    environment:
      PROM_CONTENT: |
        global:
          scrape_interval: 15s
          evaluation_interval: 15s

        scrape_configs:
          - job_name: "prometheus"
            static_configs:
              - targets: ["friday-prometheus:9090"]

          - job_name: "mysql"
            static_configs:
              - targets: ["friday-mysqld-exporter:9104"]

          - job_name: "redis"
            static_configs:
              - targets: ["friday-redis-exporter:9121"]

          # Spring Boot (Micrometer + Actuator)
          # Docker Desktop(Windows/Mac): host.docker.internal 사용 가능
          # Linux면 적절한 호스트 IP로 변경
          - job_name: "spring"
            metrics_path: /actuator/prometheus
            static_configs:
              - targets: ["host.docker.internal:10000"]
    command:
      - sh
      - -c
      - |
        mkdir -p /etc/prometheus && \
        printf "%s\n" "$PROM_CONTENT" > /etc/prometheus/prometheus.yml && \
        echo "prometheus.yml written:"
    volumes:
      - prometheus-conf:/etc/prometheus
    networks:
      - friday-net

  # --- Prometheus ---
  prometheus:
      image: prom/prometheus:v2.54.1
      container_name: friday-prometheus
      restart: unless-stopped
      ports:
        - "9090:9090"
      command:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.path=/prometheus"
        - "--storage.tsdb.retention.time=15d"
        - "--web.enable-lifecycle"
      volumes:
        - prometheus-data:/prometheus
        # ← compose 파일이 docker/ 에 있으므로 상대경로는 docker/ 기준입니다.
        - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Linux에서 host.docker.internal 해석이 안 되면 아래 한 줄 추가 (Windows/Mac은 없어도 OK)
      extra_hosts:
        - "host.docker.internal:host-gateway"
      networks:
        - friday-net

  # --- Grafana ---
  grafana:
    image: grafana/grafana:11.1.0
    container_name: friday-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: light
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - friday-net
