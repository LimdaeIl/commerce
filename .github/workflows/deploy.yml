name: Deploy To EC2

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 EC2에 접속하기
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_PORT=10000
            cd /home/ubuntu/commerce

            git fetch --all --prune
            git checkout develop
            git reset --hard origin/develop

            chmod +x gradlew
            ./gradlew clean bootJar -x test --no-daemon

            sudo fuser -k -n tcp $APP_PORT || true

            JAR=$(ls -t build/libs/*SNAPSHOT.jar 2>/dev/null | head -n1)
            [ -z "$JAR" ] && echo "SNAPSHOT JAR not found" && exit 1

            nohup java -jar "$JAR" --server.port=$APP_PORT > ./output.log 2>&1 &