name: Deploy To EC2

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 EC2에 접속하기
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true
    script: |
      set -euo pipefail

      APP_DIR="/home/ubuntu/commerce"
      BRANCH="develop"
      APP_PORT="10000"   # ← 실제 포트로 바꾸세요

      cd "$APP_DIR"

      # 1) 소스 동기화
      git fetch --all --prune
      git checkout "$BRANCH"
      git reset --hard "origin/$BRANCH"

      # 2) 빌드 (여기까지 끝난 뒤에만 JAR를 찾습니다)
      chmod +x gradlew
      ./gradlew clean bootJar -x test --no-daemon

      # 3) 이전 프로세스 종료 (포트 기준)
      sudo fuser -k -n tcp "$APP_PORT" || true

      # 4) 최신 SNAPSHOT JAR 선택 (빌드 후에!!)
      JAR=$(ls -t build/libs/*SNAPSHOT.jar 2>/dev/null | head -n1)
      if [ -z "$JAR" ]; then
        echo "XXX SNAPSHOT JAR not found under build/libs/"
        exit 1
      fi
      echo "Deploying: $JAR"

      # 5) 실행
      nohup java -jar "$JAR" --server.port="$APP_PORT" > ./output.log 2>&1 &
      echo "OOO started on port $APP_PORT"